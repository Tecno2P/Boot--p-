name: ESP32 Firmware Build & Release

on:
  push:
    branches: [ main, testing ]
  pull_request:
    branches: [ main, testing ]

permissions:
  contents: write

env:
  IDF_VERSION: "v5.1.4"
  TARGET: "esp32"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Use official Espressif ESP-IDF Docker action
      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.IDF_VERSION }}
          target: ${{ env.TARGET }}
          path: "."
          command: >
            idf.py build
            && echo "BUILD_SUCCESS=true" >> $GITHUB_ENV

      # Collect build artifacts
      - name: Collect firmware binaries
        if: success()
        run: |
          mkdir -p firmware_artifacts
          cp build/bootloader/bootloader.bin      firmware_artifacts/bootloader.bin
          cp build/partition_table/partition-table.bin firmware_artifacts/partition-table.bin
          cp build/esp32_boot_manager.bin          firmware_artifacts/app.bin
          cp build/spiffs.bin                      firmware_artifacts/spiffs.bin  2>/dev/null || true

          # Create merged binary for single-command flashing
          # (requires esptool.py which is available inside ESP-IDF Docker)
          echo "Firmware artifacts collected:"
          ls -lh firmware_artifacts/

          # Write flash info file
          cat > firmware_artifacts/FLASH_INFO.txt << 'EOF'
          ESP32 Boot Manager — Flash Instructions
          ========================================

          Method 1: Flash all at once (recommended)
          ------------------------------------------
          esptool.py -p PORT -b 460800 \
            --before default_reset \
            --after hard_reset \
            --chip esp32 \
            write_flash \
            --flash_mode dio \
            --flash_freq 40m \
            --flash_size 4MB \
            0x1000  bootloader.bin \
            0x8000  partition-table.bin \
            0x10000 app.bin \
            0x350000 spiffs.bin

          Method 2: idf.py (from project directory)
          ------------------------------------------
          idf.py -p PORT flash monitor

          Method 3: Flash only app
          -------------------------
          esptool.py -p PORT -b 460800 write_flash 0x10000 app.bin

          Notes:
          - Replace PORT with your serial port (e.g., /dev/ttyUSB0 or COM3)
          - Hold BOOT button during flash if needed
          - After first flash, OTA updates can be done via web interface
          EOF

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: firmware_artifacts/
          retention-days: 30
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: firmware_artifacts/

      - name: Get version from git tag or commit
        id: get_version
        run: |
          # Use git tag if present, else use short SHA
          VERSION=$(git tag --points-at HEAD | head -1)
          if [ -z "$VERSION" ]; then
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=$(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT
          echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ steps.get_version.outputs.SHA_SHORT }}"
          name: "ESP32 Boot Manager ${{ steps.get_version.outputs.VERSION }} (${{ steps.get_version.outputs.TIMESTAMP }})"
          body: |
            ## 🚀 Automated Firmware Release

            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`
            **Built:** ${{ steps.get_version.outputs.TIMESTAMP }}

            ### Flash Instructions

            **Full flash (first time):**
            ```bash
            esptool.py -p PORT -b 460800 \
              --chip esp32 write_flash \
              0x1000   bootloader.bin \
              0x8000   partition-table.bin \
              0x10000  app.bin \
              0x350000 spiffs.bin
            ```

            **OTA update from this release:**
            Use the Boot Manager web UI → OTA Update → URL:
            ```
            https://github.com/${{ github.repository }}/releases/latest/download/app.bin
            ```

            ### Files
            | File | Description |
            |------|-------------|
            | `bootloader.bin` | ESP32 bootloader |
            | `partition-table.bin` | Partition table |
            | `app.bin` | Main application firmware |
            | `spiffs.bin` | Web UI filesystem image |
            | `FLASH_INFO.txt` | Detailed flash instructions |

            ### Boot Manager Access
            1. Hold BOOT button while powering on
            2. Connect to WiFi: **ESP32-BootManager** / **12345678**
            3. Open browser: **http://192.168.4.1**
          draft: false
          prerelease: ${{ github.ref_name == 'testing' }}
          files: |
            firmware_artifacts/bootloader.bin
            firmware_artifacts/partition-table.bin
            firmware_artifacts/app.bin
            firmware_artifacts/spiffs.bin
            firmware_artifacts/FLASH_INFO.txt
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

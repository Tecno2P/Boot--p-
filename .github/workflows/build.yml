name: ESP32 Firmware Build & Release

on:
  push:
    branches: [ main, testing ]
  pull_request:
    branches: [ main, testing ]

permissions:
  contents: write

env:
  IDF_VERSION: "v5.1.4"
  TARGET: "esp32"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build Firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.IDF_VERSION }}
          target: ${{ env.TARGET }}
          path: "."
          command: idf.py build

      - name: Collect firmware binaries
        run: |
          mkdir -p firmware_artifacts

          cp build/bootloader/bootloader.bin          firmware_artifacts/bootloader.bin
          cp build/partition_table/partition-table.bin firmware_artifacts/partition-table.bin
          cp build/esp32_boot_manager.bin              firmware_artifacts/app.bin

          if [ -f build/spiffs.bin ]; then
            cp build/spiffs.bin firmware_artifacts/spiffs.bin
          fi

          echo "=== Firmware artifacts ==="
          ls -lh firmware_artifacts/

          cat > firmware_artifacts/FLASH_INFO.txt << 'EOF'
          ESP32 Boot Manager - Flash Instructions
          ========================================

          Full flash (first time):
          esptool.py -p PORT -b 460800 --chip esp32 \
            --before default_reset --after hard_reset \
            write_flash --flash_mode dio --flash_freq 40m --flash_size 4MB \
            0x1000   bootloader.bin \
            0x8000   partition-table.bin \
            0x10000  app.bin \
            0x350000 spiffs.bin

          Using idf.py:
            idf.py -p PORT flash monitor

          OTA update via Boot Manager web UI:
            http://192.168.4.1  (connect to AP: ESP32-BootManager / 12345678)
          EOF

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: firmware_artifacts/
          retention-days: 30
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: firmware_artifacts/

      - name: Get version info
        id: version
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M UTC')
          TAG="build-${SHA_SHORT}"
          echo "SHA_SHORT=${SHA_SHORT}"   >> $GITHUB_OUTPUT
          echo "TIMESTAMP=${TIMESTAMP}"   >> $GITHUB_OUTPUT
          echo "TAG=${TAG}"               >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "ESP32 Boot Manager (${{ steps.version.outputs.TIMESTAMP }})"
          body: |
            ## Automated Firmware Release

            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`
            **Built:** ${{ steps.version.outputs.TIMESTAMP }}

            ### Flash (first time)
            ```bash
            esptool.py -p PORT -b 460800 --chip esp32 \
              write_flash --flash_mode dio --flash_freq 40m --flash_size 4MB \
              0x1000   bootloader.bin \
              0x8000   partition-table.bin \
              0x10000  app.bin \
              0x350000 spiffs.bin
            ```

            ### OTA update from this release
            Use Boot Manager web UI → OTA → URL:
            ```
            https://github.com/${{ github.repository }}/releases/latest/download/app.bin
            ```

            ### Boot Manager Access
            1. Hold BOOT button while powering on
            2. Connect WiFi: **ESP32-BootManager** / **12345678**
            3. Open: **http://192.168.4.1**
          draft: false
          prerelease: false
          files: |
            firmware_artifacts/bootloader.bin
            firmware_artifacts/partition-table.bin
            firmware_artifacts/app.bin
            firmware_artifacts/spiffs.bin
            firmware_artifacts/FLASH_INFO.txt
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
